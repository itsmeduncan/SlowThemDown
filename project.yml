name: SlowDown
options:
  bundleIdPrefix: com.slowdown
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  SlowDown:
    type: application
    platform: iOS
    sources:
      - SlowDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slowdown.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "SlowDown needs camera access to record vehicles for speed estimation."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "SlowDown needs photo library access to import video clips."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "SlowDown uses your location to tag speed measurements with street addresses."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
  SlowDownTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SlowDownTests
    dependencies:
      - target: SlowDown
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
