name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-ios

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project ios/SlowThemDown.xcodeproj \
            -scheme SlowThemDown \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios/SlowThemDown.xcodeproj \
            -scheme SlowThemDownTests \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -skipPackagePluginValidation \
            -enableCodeCoverage YES \
            -resultBundlePath ${{ runner.temp }}/TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Generate coverage report
        if: success()
        run: |
          xcrun xccov view --report --json \
            ${{ runner.temp }}/TestResults.xcresult > ${{ runner.temp }}/coverage.json

          # Print summary to job log
          echo "### iOS Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          xcrun xccov view --report ${{ runner.temp }}/TestResults.xcresult \
            | head -20 >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: ios-coverage
          path: ${{ runner.temp }}/coverage.json
