name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-ios

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project ios/SlowThemDown.xcodeproj \
            -scheme SlowThemDown \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios/SlowThemDown.xcodeproj \
            -scheme SlowThemDownTests \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO | xcpretty
