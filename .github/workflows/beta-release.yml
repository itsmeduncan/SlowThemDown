name: Beta Release

on:
  workflow_run:
    workflows: ["iOS CI", "Android CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: beta-release
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check both CI workflows passed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # If the triggering workflow failed, abort immediately
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "Triggering workflow failed — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TRIGGERING_WORKFLOW="${{ github.event.workflow_run.name }}"

          if [ "$TRIGGERING_WORKFLOW" = "iOS CI" ]; then
            OTHER_WORKFLOW="Android CI"
          else
            OTHER_WORKFLOW="iOS CI"
          fi

          # Check the other workflow's latest main run
          OTHER_STATUS=$(gh api \
            "repos/${{ github.repository }}/actions/workflows" \
            --jq ".workflows[] | select(.name == \"$OTHER_WORKFLOW\") | .id" \
          )

          if [ -z "$OTHER_STATUS" ]; then
            echo "Could not find workflow '$OTHER_WORKFLOW' — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_CONCLUSION=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/$OTHER_STATUS/runs?branch=main&per_page=1" \
            --jq '.workflow_runs[0].conclusion' \
          )

          if [ "$LATEST_CONCLUSION" = "success" ]; then
            echo "Both CI workflows passed"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Other workflow status: $LATEST_CONCLUSION — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  compute-version:
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      beta_number: ${{ steps.version.outputs.beta_number }}
      build_number: ${{ steps.version.outputs.build_number }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version numbers
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION"

          # Count existing beta tags for this version
          BETA_COUNT=$(git tag -l "v${VERSION}-beta.*" | wc -l | tr -d ' ')
          BETA_NUMBER=$((BETA_COUNT + 1))
          echo "beta_number=$BETA_NUMBER"

          # Build number = total commits on main (monotonically increasing, never reused)
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "Commit count: $BUILD_NUMBER"
          echo "build_number=$BUILD_NUMBER"

          TAG="v${VERSION}-beta.${BETA_NUMBER}"
          echo "tag=$TAG"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "beta_number=$BETA_NUMBER" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  ios-beta:
    needs: compute-version
    runs-on: macos-15
    env:
      VERSION: ${{ needs.compute-version.outputs.version }}
      BUILD_NUMBER: ${{ needs.compute-version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install Apple certificate and provisioning profile
        env:
          CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ runner.temp }}/keychain-pw
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # Decode secrets
          echo -n "$CERT_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Generate Xcode project
        run: cd ios && xcodegen generate

      - name: Archive
        run: |
          xcodebuild archive \
            -project ios/SlowDown.xcodeproj \
            -scheme SlowDown \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/SlowDown.xcarchive \
            -skipPackagePluginValidation \
            MARKETING_VERSION=$VERSION \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" \
            | xcpretty

      - name: Export IPA
        run: |
          # Replace placeholder in ExportOptions.plist
          sed -i '' "s/\$(IOS_PROVISIONING_PROFILE_NAME)/${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}/" \
            ios/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SlowDown.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ios/ExportOptions.plist \
            | xcpretty

      - name: Install App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/SlowDown.ipa \
            --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-beta-ipa
          path: ${{ runner.temp }}/export/SlowDown.ipa

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  android-beta:
    needs: compute-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.compute-version.outputs.version }}
      BUILD_NUMBER: ${{ needs.compute-version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/upload.jks

      - name: Build release AAB
        run: |
          ./gradlew :android:app:bundleRelease \
            -PversionCode=$BUILD_NUMBER \
            -PversionName=$VERSION \
            -Pandroid.injected.signing.store.file=$RUNNER_TEMP/upload.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.slowdown.android
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: draft

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-beta-aab
          path: android/app/build/outputs/bundle/release/*.aab

  tag-and-release:
    needs: [compute-version, ios-beta, android-beta]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tag and pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.compute-version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --prerelease
