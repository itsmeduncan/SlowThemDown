name: Sync Version

on:
  push:
    branches: [main]
    paths: [VERSION]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Sync version to dependent files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version=.*/version=$VERSION/" gradle.properties
          sed -i "s/MARKETING_VERSION: \".*\"/MARKETING_VERSION: \"$VERSION\"/" ios/project.yml
          sed -i "s/?: \".*\"/?: \"$VERSION\"/" android/app/build.gradle.kts

          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle.properties ios/project.yml android/app/build.gradle.kts
          git commit -m "Sync version to $VERSION"
          git push
