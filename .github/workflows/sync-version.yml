name: Sync Version

on:
  push:
    branches: [main]
    paths: [VERSION]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read VERSION
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Sync gradle.properties
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: sed -i "s/^version=.*/version=$VERSION/" gradle.properties

      - name: Sync ios/project.yml
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          yq -i ".targets.SlowThemDown.settings.base.MARKETING_VERSION = \"$VERSION\"" \
            ios/project.yml

      - name: Sync android/app/build.gradle.kts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/\(versionName = findProperty(\"versionName\") as? String ?: \"\)[^\"]*\"/\1$VERSION\"/" \
            android/app/build.gradle.kts

      - name: Verify version sync
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          errors=0

          if ! grep -q "^version=$VERSION$" gradle.properties; then
            echo "::error::gradle.properties does not contain version=$VERSION"
            errors=$((errors + 1))
          fi

          if ! grep -q "MARKETING_VERSION: \"$VERSION\"" ios/project.yml; then
            echo "::error::ios/project.yml does not contain MARKETING_VERSION: \"$VERSION\""
            errors=$((errors + 1))
          fi

          if ! grep -q "?: \"$VERSION\"" android/app/build.gradle.kts; then
            echo "::error::android/app/build.gradle.kts does not contain versionName fallback \"$VERSION\""
            errors=$((errors + 1))
          fi

          if [ "$errors" -gt 0 ]; then
            echo "::error::Version sync verification failed with $errors error(s)"
            exit 1
          fi

          echo "All files verified with version $VERSION"

      - name: Create PR
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git diff --quiet && exit 0
          branch="chore/sync-version-$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add gradle.properties ios/project.yml android/app/build.gradle.kts
          git commit -m "Sync version to $VERSION"
          git push -u origin "$branch"
          gh pr create \
            --title "Sync version to $VERSION" \
            --body "Auto-generated by the sync-version workflow. Updates \`gradle.properties\`, \`ios/project.yml\`, and \`android/app/build.gradle.kts\` to match \`VERSION\` file." \
            --base main \
            --head "$branch"
