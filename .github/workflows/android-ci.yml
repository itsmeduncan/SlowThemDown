name: Android CI

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle build outputs
        uses: actions/cache@v4
        with:
          path: |
            .gradle/configuration-cache
            android/app/build
            shared/build
          key: gradle-build-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-build-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Test, coverage, and lint
        run: |
          ./gradlew \
            :shared:allTests \
            :android:app:koverXmlReport \
            :android:app:koverHtmlReport \
            :android:app:lintDebug \
            --no-daemon
        # Kover 0.9.5+ auto-triggers testDebugUnitTest when generating reports

      - name: Coverage summary
        if: success()
        run: |
          echo "### Android Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          REPORT=android/app/build/reports/kover/report.xml
          if [ ! -f "$REPORT" ]; then
            echo "No coverage report found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Extract line coverage from Kover XML (top-level counter)
          LINE_COVERED=$(grep 'type="LINE"' "$REPORT" | head -1 | sed 's/.*covered="\([0-9]*\)".*/\1/')
          LINE_MISSED=$(grep 'type="LINE"' "$REPORT" | head -1 | sed 's/.*missed="\([0-9]*\)".*/\1/')
          if [ -n "$LINE_COVERED" ] && [ -n "$LINE_MISSED" ] && [ "$LINE_COVERED" != "0" -o "$LINE_MISSED" != "0" ]; then
            TOTAL=$((LINE_COVERED + LINE_MISSED))
            if [ "$TOTAL" -gt 0 ]; then
              PCT=$((LINE_COVERED * 100 / TOTAL))
              echo "Line coverage: **${PCT}%** (${LINE_COVERED}/${TOTAL})" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "Coverage data is empty — check Kover instrumentation." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-results
          path: android/app/build/reports/lint-results-debug.html

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: android-coverage
          path: |
            android/app/build/reports/kover/report.xml
            android/app/build/reports/kover/html/
