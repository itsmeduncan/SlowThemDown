name: Update Changelog

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes"
            exit 0
          fi

          # Use the Contents API to update the file directly on main.
          # This bypasses branch protection when the actor is github-actions[bot]
          # and the repo has "Allow specified actors to bypass" configured,
          # or when the ruleset allows the GitHub Actions app.
          CONTENT=$(base64 -w 0 CHANGELOG.md)
          FILE_SHA=$(gh api "repos/${{ github.repository }}/contents/CHANGELOG.md" --jq '.sha')

          gh api "repos/${{ github.repository }}/contents/CHANGELOG.md" \
            -X PUT \
            -f message="Update CHANGELOG.md for ${TAG}" \
            -f content="$CONTENT" \
            -f sha="$FILE_SHA" \
            -f branch="main" \
            --silent

          echo "CHANGELOG.md updated for ${TAG}"
