name: Update Changelog

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and auto-merge changelog PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changelog changes"
            exit 0
          fi

          BRANCH="auto/changelog-${TAG}-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG.md for ${TAG}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Update CHANGELOG.md for ${TAG}" \
            --body "Auto-generated changelog update for release ${TAG}." \
            --base main \
            --head "$BRANCH"

          # Auto-merge if enabled, otherwise the PR needs manual merge
          gh pr merge "$BRANCH" --squash --auto --delete-branch || \
            echo "::notice::Auto-merge not available. Please merge PR manually: https://github.com/${{ github.repository }}/pull/$(gh pr view "$BRANCH" --json number --jq .number)"
