name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  ios-release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute build number
        id: build
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-ios

      - name: Install Apple certificate and provisioning profile
        env:
          CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo -n "$CERT_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive
        run: |
          # Strip leading 'v' from tag for marketing version
          MARKETING_VERSION="${VERSION#v}"
          xcodebuild archive \
            -project ios/SlowThemDown.xcodeproj \
            -scheme SlowThemDown \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/SlowThemDown.xcarchive \
            -skipPackagePluginValidation \
            MARKETING_VERSION=$MARKETING_VERSION \
            CURRENT_PROJECT_VERSION=${{ steps.build.outputs.build_number }} \
            DEVELOPMENT_TEAM_OVERRIDE=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY_OVERRIDE="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER_OVERRIDE="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}"

      - name: Install App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Export and upload to App Store Connect
        run: |
          sed -i '' "s/\$(IOS_PROVISIONING_PROFILE_NAME)/${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}/" \
            ios/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SlowThemDown.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v5
        with:
          name: ios-release-ipa
          path: ${{ runner.temp }}/export/*.ipa

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  android-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test, lint, and build release
        run: ./gradlew :shared:allTests :android:app:testDebugUnitTest :android:app:lintRelease :android:app:assembleRelease :android:app:bundleRelease --no-configuration-cache

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v5
        with:
          name: android-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab

  create-release:
    needs: [ios-release, android-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download iOS artifact
        uses: actions/download-artifact@v5
        with:
          name: ios-release-ipa
          path: release-assets/ios

      - name: Download Android artifacts
        uses: actions/download-artifact@v5
        with:
          name: android-release
          path: release-assets/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/ios/*.ipa
            release-assets/android/**/*.apk
            release-assets/android/**/*.aab
          generate_release_notes: true
