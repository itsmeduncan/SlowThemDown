name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  ios-release:
    runs-on: macos-26
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute build number
        id: build
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-ios

      - name: Install Apple certificate and provisioning profile
        env:
          CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo -n "$CERT_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Set up Firebase credentials
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SA" > "$RUNNER_TEMP/firebase-sa.json"

      - name: Archive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          # Strip leading 'v' from tag for marketing version
          MARKETING_VERSION="${VERSION#v}"
          xcodebuild archive \
            -project ios/SlowThemDown.xcodeproj \
            -scheme SlowThemDown \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/SlowThemDown.xcarchive \
            -skipPackagePluginValidation \
            MARKETING_VERSION=$MARKETING_VERSION \
            CURRENT_PROJECT_VERSION=${{ steps.build.outputs.build_number }} \
            DEVELOPMENT_TEAM_OVERRIDE=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY_OVERRIDE="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER_OVERRIDE="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}"

      - name: Install App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Export and upload to App Store Connect
        run: |
          sed -i '' "s/\$(IOS_PROVISIONING_PROFILE_NAME)/${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}/" \
            ios/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/SlowThemDown.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      - name: Remind to submit for review
        run: |
          echo "::notice::Build uploaded to App Store Connect. To submit for review:"
          echo "::notice::1. Go to https://appstoreconnect.apple.com → My Apps → Slow Them Down"
          echo "::notice::2. Select the build under the new version"
          echo "::notice::3. Fill in release notes, screenshots (first submission), and privacy questionnaire"
          echo "::notice::4. Click Submit for Review"

      - name: Upload export artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ios-release-export
          path: ${{ runner.temp }}/export/
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  android-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute build number
        id: build
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Test and lint
        run: ./gradlew :shared:allTests :android:app:testDebugUnitTest :android:app:lintRelease

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo -n "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/upload.jks

      - name: Build signed release APK and AAB
        run: |
          MARKETING_VERSION="${VERSION#v}"
          ./gradlew :android:app:assembleRelease :android:app:bundleRelease \
            -PversionCode=${{ steps.build.outputs.build_number }} \
            -PversionName=$MARKETING_VERSION \
            -Pandroid.injected.signing.store.file=$RUNNER_TEMP/upload.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play production track
        continue-on-error: true
        id: play-upload
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.slowdown.android
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: production
          status: draft
          releaseName: ${{ github.ref_name }}

      - name: Warn if Play Store upload failed
        if: steps.play-upload.outcome == 'failure'
        run: echo "::warning::Google Play upload failed. Upload the AAB manually from the GitHub Release artifacts."

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab

  create-release:
    needs: [ios-release, android-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download iOS artifact
        uses: actions/download-artifact@v6
        with:
          name: ios-release-export
          path: release-assets/ios

      - name: Download Android artifacts
        uses: actions/download-artifact@v6
        with:
          name: android-release
          path: release-assets/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/ios/**/*
            release-assets/android/**/*.apk
            release-assets/android/**/*.aab
          generate_release_notes: true
