name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  ios-archive:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('ios/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
            /opt/homebrew/Cellar/xcodegen
          key: brew-xcodegen-${{ runner.os }}

      - name: Install XcodeGen
        run: brew install xcodegen || true

      - name: Generate Xcode project
        run: cd ios && xcodegen generate

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project ios/SlowThemDown.xcodeproj \
            -scheme SlowThemDown \
            -destination 'generic/platform=iOS' \
            -archivePath build/SlowThemDown.xcarchive \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" | xcpretty

      - name: Zip archive
        run: |
          cd build
          zip -r SlowThemDown.xcarchive.zip SlowThemDown.xcarchive

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: build/SlowThemDown.xcarchive.zip

  android-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test, lint, and build release
        run: ./gradlew :shared:allTests :android:app:testDebugUnitTest :android:app:lintRelease :android:app:assembleRelease :android:app:bundleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab

  create-release:
    needs: [ios-archive, android-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-archive
          path: release-assets

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-assets/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/SlowThemDown.xcarchive.zip
            release-assets/android/**/*.apk
            release-assets/android/**/*.aab
          generate_release_notes: true
