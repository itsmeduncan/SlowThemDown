name: SlowThemDown
options:
  bundleIdPrefix: com.slowthemdown
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
packages:
  FirebaseCrashlytics:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.10.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  SlowThemDown:
    type: application
    platform: iOS
    sources:
      - SlowThemDown
    dependencies:
      - package: FirebaseCrashlytics
        product: FirebaseCrashlytics
    postCompileScripts:
      - script: |
          if [ "${CONFIGURATION}" != "Release" ]; then
            exit 0
          fi
          CRASHLYTICS_RUN="${BUILD_DIR%/Build/*}/SourcePackages/artifacts/firebase-ios-sdk/FirebaseCrashlytics/run"
          if [ ! -x "$CRASHLYTICS_RUN" ]; then
            echo "warning: Crashlytics upload script not found, skipping dSYM upload"
            exit 0
          fi
          "$CRASHLYTICS_RUN"
        name: Upload dSYMs to Crashlytics
        inputFiles:
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Resources/DWARF/$(TARGET_NAME)
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Info.plist
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slowthemdown.app
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "Slow Them Down"
        INFOPLIST_KEY_NSCameraUsageDescription: "Slow Them Down needs camera access to record vehicles for speed estimation."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Slow Them Down needs microphone access because video recording includes audio capture."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Slow Them Down needs photo library access to import video clips."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Slow Them Down uses your location to tag speed measurements with street addresses."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: "Automatic"
      configs:
        Release:
          CODE_SIGN_STYLE: "Manual"
          CODE_SIGN_IDENTITY: "$(CODE_SIGN_IDENTITY_OVERRIDE)"
          DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM_OVERRIDE)"
          PROVISIONING_PROFILE_SPECIFIER: "$(PROVISIONING_PROFILE_SPECIFIER_OVERRIDE)"
  SlowThemDownTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SlowThemDownTests
    dependencies:
      - target: SlowThemDown
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
